<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SCG Tuitions — Parent Portal</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
</head>
<body>
  <div class="login-page">
    <div class="login-card">

      <div class="login-logo">
        <div class="login-logo-icon">SCG</div>
        <h1 class="login-title">SCG Tuitions</h1>
        <p class="login-subtitle">Personalised Learning for Every Child</p>
      </div>

      <!-- Tab toggle: Login / Register -->
      <div class="tabs">
        <button class="tab-btn active" id="tab-login"    onclick="switchTab('login')">Sign In</button>
        <button class="tab-btn"        id="tab-register" onclick="switchTab('register')">Register</button>
      </div>

      <!-- Alert -->
      <div id="auth-alert" class="alert alert-error" style="display:none;"></div>

      <!-- ── LOGIN FORM ── -->
      <form id="login-form" onsubmit="handleLogin(event)">
        <div class="form-group">
          <label for="login-email">Email address</label>
          <input id="login-email" type="email" placeholder="you@example.com" required autocomplete="email">
        </div>
        <div class="form-group">
          <label for="login-password">Password</label>
          <input id="login-password" type="password" placeholder="••••••••" required autocomplete="current-password">
        </div>
        <button class="btn btn-primary" type="submit" id="login-btn">Sign In</button>
      </form>

      <!-- ── REGISTER FORM (hidden by default) ── -->
      <form id="register-form" style="display:none;" onsubmit="handleRegister(event)">
        <div class="form-row">
          <div class="form-group">
            <label for="reg-first">First name</label>
            <input id="reg-first" type="text" placeholder="Jane" required>
          </div>
          <div class="form-group">
            <label for="reg-last">Last name</label>
            <input id="reg-last" type="text" placeholder="Smith" required>
          </div>
        </div>

        <div class="form-group">
          <label for="reg-email">Email address</label>
          <input id="reg-email" type="email" placeholder="you@example.com" required autocomplete="email">
        </div>

        <div class="form-group">
          <label for="reg-password">Password <small style="color:var(--text-muted);font-weight:400">(min 6 characters)</small></label>
          <input id="reg-password" type="password" placeholder="••••••••" required minlength="6">
        </div>

        <div class="form-group">
          <label for="reg-role">I am a…</label>
          <select id="reg-role" onchange="toggleChildFields()" required>
            <option value="">— Select role —</option>
            <option value="parent">Parent / Guardian</option>
            <option value="teacher">Teacher / Tutor</option>
          </select>
        </div>

        <!-- Parent-only fields -->
        <div id="parent-fields" style="display:none;">
          <div class="form-group">
            <label for="reg-child-name">Child's full name</label>
            <input id="reg-child-name" type="text" placeholder="e.g. Oliver Smith">
          </div>
          <div class="form-group">
            <label for="reg-child-year">School year group</label>
            <select id="reg-child-year">
              <option value="">— Select year —</option>
              <option>Year 4</option>
              <option>Year 5</option>
              <option>Year 6</option>
              <option>Year 7</option>
              <option>Year 8</option>
              <option>Year 9</option>
              <option>Year 10</option>
              <option>Year 11</option>
            </select>
          </div>
        </div>

        <button class="btn btn-primary" type="submit" id="register-btn">Create Account</button>
      </form>

    </div>
  </div>

  <!-- Firebase SDKs -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-messaging-compat.js"></script>
  <script src="js/firebase-config.js"></script>

  <script>
    // ── Tab switching ─────────────────────────────────────────────────────────
    function switchTab(tab) {
      const isLogin = tab === 'login';
      document.getElementById('login-form').style.display    = isLogin ? 'block' : 'none';
      document.getElementById('register-form').style.display = isLogin ? 'none'  : 'block';
      document.getElementById('tab-login').classList.toggle('active', isLogin);
      document.getElementById('tab-register').classList.toggle('active', !isLogin);
      clearAlert('auth-alert');
    }

    function toggleChildFields() {
      const role = document.getElementById('reg-role').value;
      document.getElementById('parent-fields').style.display = role === 'parent' ? 'block' : 'none';
    }

    function clearAlert(id) {
      const el = document.getElementById(id);
      if (el) el.style.display = 'none';
    }

    function showAlert(type, msg) {
      const el = document.getElementById('auth-alert');
      el.className = `alert alert-${type}`;
      el.textContent = msg;
      el.style.display = 'flex';
    }

    // ── If already logged in, redirect ────────────────────────────────────────
    auth.onAuthStateChanged(async user => {
      if (!user) return;
      try {
        const snap = await db.collection('users').doc(user.uid).get();
        if (snap.exists) {
          const role = snap.data().role;
          window.location.href = role === 'teacher'
            ? 'teacher-dashboard.html'
            : 'parent-dashboard.html';
        }
      } catch {}
    });

    // ── Login handler ─────────────────────────────────────────────────────────
    async function handleLogin(e) {
      e.preventDefault();
      clearAlert('auth-alert');
      const btn   = document.getElementById('login-btn');
      const email = document.getElementById('login-email').value.trim();
      const pass  = document.getElementById('login-password').value;

      btn.disabled = true;
      btn.textContent = 'Signing in…';

      try {
        await auth.signInWithEmailAndPassword(email, pass);
        // onAuthStateChanged will handle redirect
      } catch (err) {
        showAlert('error', friendlyAuthError(err.code));
        btn.disabled = false;
        btn.textContent = 'Sign In';
      }
    }

    // ── Register handler ──────────────────────────────────────────────────────
    async function handleRegister(e) {
      e.preventDefault();
      clearAlert('auth-alert');

      const firstName  = document.getElementById('reg-first').value.trim();
      const lastName   = document.getElementById('reg-last').value.trim();
      const email      = document.getElementById('reg-email').value.trim();
      const pass       = document.getElementById('reg-password').value;
      const role       = document.getElementById('reg-role').value;
      const childName  = document.getElementById('reg-child-name').value.trim();
      const childYear  = document.getElementById('reg-child-year').value;

      if (!role) { showAlert('error', 'Please select your role.'); return; }

      const btn = document.getElementById('register-btn');
      btn.disabled = true;
      btn.textContent = 'Creating account…';

      try {
        const cred = await auth.createUserWithEmailAndPassword(email, pass);

        const profile = {
          displayName: `${firstName} ${lastName}`,
          email,
          role,
          createdAt: firebase.firestore.FieldValue.serverTimestamp(),
        };

        if (role === 'parent') {
          profile.childName = childName;
          profile.childYear = childYear;
        }

        await db.collection('users').doc(cred.user.uid).set(profile);
        // onAuthStateChanged handles redirect
      } catch (err) {
        showAlert('error', friendlyAuthError(err.code));
        btn.disabled = false;
        btn.textContent = 'Create Account';
      }
    }

    function friendlyAuthError(code) {
      const map = {
        'auth/user-not-found':       'No account found with that email.',
        'auth/wrong-password':       'Incorrect password. Please try again.',
        'auth/invalid-email':        'Please enter a valid email address.',
        'auth/email-already-in-use': 'An account with this email already exists.',
        'auth/weak-password':        'Password must be at least 6 characters.',
        'auth/too-many-requests':    'Too many attempts. Please try again later.',
        'auth/invalid-credential':   'Invalid email or password.',
      };
      return map[code] || 'Something went wrong. Please try again.';
    }
  </script>
</body>
</html>
