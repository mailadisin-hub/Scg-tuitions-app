<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SCG Tuitions — Attendance</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#1e3a8a">
</head>
<body>

  <header class="app-header">
    <a class="logo" href="#">
      <div class="logo-icon">SCG</div>
      <div class="logo-text">
        <span class="logo-name">SCG Tuitions</span>
        <span class="logo-tagline">Teacher Portal</span>
      </div>
    </a>
    <div class="header-right">
      <div class="user-badge" id="user-badge">…</div>
      <button class="btn-logout" onclick="signOut()">Sign Out</button>
    </div>
  </header>

  <div class="page-wrapper-wide" id="main-content" style="display:none;">
    <div class="dashboard-grid">

      <!-- ── Left: Mark Attendance ── -->
      <div>
        <div class="card">
          <div class="card-header">
            <span class="card-title">📋 Mark Attendance</span>
          </div>
          <div class="card-body">
            <div id="att-alert" class="alert alert-error" style="display:none;"></div>

            <form id="attendance-form" onsubmit="markAttendance(event)">
              <div class="form-group">
                <label for="att-student">Student</label>
                <select id="att-student" required>
                  <option value="">— Select a student —</option>
                </select>
              </div>

              <div class="form-group">
                <label for="att-date">Date</label>
                <input id="att-date" type="date" required>
              </div>

              <div class="form-group">
                <label for="att-label">Session Label</label>
                <input id="att-label" type="text" placeholder="e.g. Saturday 10am – Week 12" maxlength="80" required>
              </div>

              <div class="form-group">
                <label for="att-status">Status</label>
                <select id="att-status" required>
                  <option value="">— Select status —</option>
                  <option value="present">Present</option>
                  <option value="absent">Absent</option>
                  <option value="late">Late</option>
                </select>
              </div>

              <div class="form-group">
                <label for="att-notes">Notes (optional)</label>
                <textarea id="att-notes" placeholder="Optional notes" maxlength="300"></textarea>
              </div>

              <button class="btn btn-primary btn-full" type="submit" id="att-btn">
                ✅ Save Attendance
              </button>
            </form>
          </div>
        </div>
      </div>

      <!-- ── Right: Attendance Records ── -->
      <div>
        <div class="card">
          <div class="card-header">
            <span class="card-title">📋 Attendance Records</span>
          </div>
          <div class="card-body" style="padding-bottom:8px;">
            <div class="form-group" style="margin-bottom:16px;">
              <label for="filter-student">Filter by student</label>
              <select id="filter-student" onchange="filterAttendance()">
                <option value="">All students</option>
              </select>
            </div>
          </div>
          <div id="att-list">
            <div class="loader"><div class="spinner"></div></div>
          </div>
        </div>
      </div>

    </div>
  </div>

  <div id="toast-container"></div>

  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-messaging-compat.js"></script>
  <script src="js/firebase-config.js"></script>
  <script src="js/notifications.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/nav.js"></script>

  <script>
    let currentUser = null;
    let parentsList = [];
    let allRecords  = [];
    let attListener = null;

    // ── Boot ──────────────────────────────────────────────────────────────────
    (async () => {
      try {
        currentUser = await requireAuth('teacher');
        renderHeaderUser(currentUser);
        renderPortalNav('attendance', 'teacher');
        document.getElementById('main-content').style.display = 'block';

        // Default date to today
        document.getElementById('att-date').value = todayISO();

        parentsList = await loadParentsList();
        populateParentSelect('att-student', parentsList);
        populateFilterSelect();
        subscribeAttendance();
      } catch {}
    })();

    // ── Helpers ───────────────────────────────────────────────────────────────
    function todayISO() {
      return new Date().toISOString().slice(0, 10);
    }

    function populateFilterSelect() {
      const sel = document.getElementById('filter-student');
      sel.innerHTML = '<option value="">All students</option>';
      parentsList.forEach(p => {
        const label = p.childName
          ? `${p.displayName} — ${p.childName}`
          : p.displayName;
        sel.innerHTML += `<option value="${p.uid}">${escHtml(label)}</option>`;
      });
    }

    // ── Mark Attendance ───────────────────────────────────────────────────────
    async function markAttendance(e) {
      e.preventDefault();
      clearAlert('att-alert');

      const studentId = document.getElementById('att-student').value;
      const dateVal   = document.getElementById('att-date').value;
      const label     = document.getElementById('att-label').value.trim();
      const status    = document.getElementById('att-status').value;
      const notes     = document.getElementById('att-notes').value.trim();

      if (!studentId) {
        setAlert('att-alert', 'error', 'Please select a student.');
        return;
      }

      const parent = parentsList.find(p => p.uid === studentId);
      const studentName = parent
        ? (parent.childName || parent.displayName)
        : studentId;

      const btn = document.getElementById('att-btn');
      btn.disabled = true;
      btn.textContent = 'Saving…';

      try {
        await db.collection('attendance').add({
          teacherId:    currentUser.uid,
          studentId,
          studentName,
          date:         firebase.firestore.Timestamp.fromDate(new Date(dateVal + 'T00:00:00')),
          sessionLabel: label,
          status,
          notes,
          createdAt:    firebase.firestore.FieldValue.serverTimestamp(),
        });

        document.getElementById('attendance-form').reset();
        document.getElementById('att-date').value = todayISO();
        showToast('Attendance saved', `${studentName} marked as ${status}.`, '✅');
      } catch (err) {
        setAlert('att-alert', 'error', 'Failed to save attendance. Please try again.');
        console.error(err);
      }

      btn.disabled = false;
      btn.textContent = '✅ Save Attendance';
    }

    // ── Subscribe to attendance records ───────────────────────────────────────
    function subscribeAttendance() {
      if (attListener) attListener();

      attListener = db.collection('attendance')
        .where('teacherId', '==', currentUser.uid)
        .orderBy('date', 'desc')
        .onSnapshot(snap => {
          allRecords = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
          filterAttendance();
        }, err => console.error('Attendance listener error:', err));
    }

    // ── Filter records ────────────────────────────────────────────────────────
    function filterAttendance() {
      const selectedId = document.getElementById('filter-student').value;
      const filtered = selectedId
        ? allRecords.filter(r => r.studentId === selectedId)
        : allRecords;
      renderAttendanceRecords(filtered);
    }

    // ── Render records ────────────────────────────────────────────────────────
    function renderAttendanceRecords(records) {
      const list = document.getElementById('att-list');

      if (!records.length) {
        list.innerHTML = `
          <div class="empty-state">
            <div class="empty-icon">📋</div>
            <h3>No attendance records yet</h3>
            <p>Use the form on the left to mark your first session.</p>
          </div>`;
        return;
      }

      list.innerHTML = records.map(r => {
        let badgeClass = 'badge-info';
        if (r.status === 'present') badgeClass = 'badge-success';
        else if (r.status === 'absent') badgeClass = 'badge-danger';
        else if (r.status === 'late')  badgeClass = 'badge-warning';

        return `
          <div class="sent-message-item">
            <div class="sent-msg-header">
              <span class="sent-msg-to">${escHtml(r.studentName)}</span>
              <span><span class="badge ${badgeClass}">${escHtml(r.status)}</span></span>
            </div>
            <div class="sent-msg-subject">${escHtml(r.sessionLabel || '')}</div>
            <div class="sent-msg-preview">${r.notes ? escHtml(r.notes) : '<span style="color:var(--text-light);">No notes</span>'}</div>
            <div style="display:flex;align-items:center;justify-content:space-between;margin-top:6px;">
              <span class="sent-msg-time">${formatDate(r.date)}</span>
              <button class="btn btn-danger btn-sm" onclick="deleteRecord('${r.id}')">Delete</button>
            </div>
          </div>`;
      }).join('');
    }

    // ── Delete record ─────────────────────────────────────────────────────────
    async function deleteRecord(id) {
      if (!window.confirm('Delete this attendance record?')) return;
      try {
        await db.collection('attendance').doc(id).delete();
        showToast('Deleted', 'Attendance record removed.', '🗑️');
      } catch (err) {
        showToast('Error', 'Could not delete record. Please try again.', '❌');
        console.error(err);
      }
    }

    // ── Cleanup ───────────────────────────────────────────────────────────────
    window.addEventListener('beforeunload', () => {
      if (attListener) attListener();
    });
  </script>
</body>
</html>
