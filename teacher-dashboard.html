<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SCG Tuitions — Teacher Dashboard</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
</head>
<body>

  <!-- ── Header ────────────────────────────────────────────────────────────── -->
  <header class="app-header">
    <a class="logo" href="#">
      <div class="logo-icon">SCG</div>
      <div class="logo-text">
        <span class="logo-name">SCG Tuitions</span>
        <span class="logo-tagline">Teacher Portal</span>
      </div>
    </a>
    <div class="header-right">
      <div class="user-badge" id="user-badge">…</div>
      <button class="btn-logout" onclick="signOut()">Sign Out</button>
    </div>
  </header>

  <div class="page-wrapper-wide" id="main-content" style="display:none;">

    <!-- Stats row -->
    <div class="stats-row" style="margin-bottom:24px;">
      <div class="stat-card">
        <div class="stat-icon blue">👥</div>
        <div class="stat-info">
          <p>Registered Parents</p>
          <h3 id="stat-parents">—</h3>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-icon orange">📤</div>
        <div class="stat-info">
          <p>Messages Sent</p>
          <h3 id="stat-sent">—</h3>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-icon green">✅</div>
        <div class="stat-info">
          <p>Confirmed Read</p>
          <h3 id="stat-confirmed">—</h3>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-icon red">⏳</div>
        <div class="stat-info">
          <p>Awaiting Read</p>
          <h3 id="stat-pending">—</h3>
        </div>
      </div>
    </div>

    <div class="dashboard-grid">

      <!-- ── Compose Panel ── -->
      <div>
        <div class="card">
          <div class="card-header">
            <span class="card-title">✉️ New Message</span>
          </div>
          <div class="card-body">
            <div id="compose-alert" class="alert alert-error" style="display:none;"></div>

            <form id="compose-form" onsubmit="sendMessage(event)">
              <div class="form-group">
                <label for="to-parent">Send to (Parent)</label>
                <select id="to-parent" required>
                  <option value="">— Select a parent —</option>
                </select>
              </div>

              <div class="form-group">
                <label for="msg-subject">Subject</label>
                <input id="msg-subject" type="text"
                  placeholder="e.g. Progress update for Oliver"
                  maxlength="120" required>
              </div>

              <div class="form-group compose-area">
                <label for="msg-body">Message</label>
                <textarea id="msg-body"
                  placeholder="Write your message to the parent here…"
                  maxlength="2000" required></textarea>
                <div style="text-align:right;font-size:12px;color:var(--text-muted);margin-top:4px;">
                  <span id="char-count">0</span>/2000
                </div>
              </div>

              <div class="alert alert-info" style="font-size:13px;">
                🔔 The parent will receive hourly browser notifications until they confirm they have read this message.
              </div>

              <button class="btn btn-primary btn-full" type="submit" id="send-btn" style="margin-top:16px;">
                📤 Send Message
              </button>
            </form>
          </div>
        </div>
      </div>

      <!-- ── Sent Messages Panel ── -->
      <div>
        <div class="card">
          <div class="card-header">
            <span class="card-title">📋 Sent Messages</span>
            <span id="sent-badge"></span>
          </div>
          <div id="sent-list">
            <div class="loader"><div class="spinner"></div></div>
          </div>
        </div>
      </div>

    </div>
  </div>

  <!-- Toast container -->
  <div id="toast-container"></div>

  <!-- Firebase SDKs -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-messaging-compat.js"></script>
  <script src="js/firebase-config.js"></script>
  <script src="js/notifications.js"></script>
  <script src="js/auth.js"></script>

  <script>
    let currentUser    = null;
    let sentListener   = null;
    let parentsList    = [];

    // ── Boot ────────────────────────────────────────────────────────────────
    (async () => {
      try {
        currentUser = await requireAuth('teacher');
        renderHeaderUser(currentUser);
        document.getElementById('main-content').style.display = 'block';
        await loadParents();
        subscribeToSentMessages();
      } catch {}
    })();

    // ── Character counter ────────────────────────────────────────────────────
    document.getElementById('msg-body').addEventListener('input', function () {
      document.getElementById('char-count').textContent = this.value.length;
    });

    // ── Load parents list ────────────────────────────────────────────────────
    async function loadParents() {
      const snap = await db.collection('users')
        .where('role', '==', 'parent')
        .orderBy('displayName')
        .get();

      parentsList = snap.docs.map(doc => ({ uid: doc.id, ...doc.data() }));

      const sel = document.getElementById('to-parent');
      sel.innerHTML = '<option value="">— Select a parent —</option>';

      if (!parentsList.length) {
        sel.innerHTML += '<option value="" disabled>No parents registered yet</option>';
      }

      parentsList.forEach(p => {
        const label = p.childName
          ? `${p.displayName} (child: ${p.childName}${p.childYear ? ', ' + p.childYear : ''})`
          : p.displayName;
        sel.innerHTML += `<option value="${p.uid}">${escHtml(label)}</option>`;
      });

      document.getElementById('stat-parents').textContent = parentsList.length;
    }

    // ── Subscribe to sent messages ───────────────────────────────────────────
    function subscribeToSentMessages() {
      if (sentListener) sentListener();

      sentListener = db.collection('messages')
        .where('fromUserId', '==', currentUser.uid)
        .orderBy('createdAt', 'desc')
        .onSnapshot(snap => {
          const messages = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
          renderSentMessages(messages);
          updateTeacherStats(messages);
        }, err => console.error('Sent messages error:', err));
    }

    // ── Render sent messages ─────────────────────────────────────────────────
    function renderSentMessages(messages) {
      const list = document.getElementById('sent-list');

      if (!messages.length) {
        list.innerHTML = `
          <div class="empty-state">
            <div class="empty-icon">📤</div>
            <h3>No messages sent yet</h3>
            <p>Use the form on the left to send your first message.</p>
          </div>`;
        return;
      }

      list.innerHTML = messages.map(msg => {
        const isRead  = msg.acknowledged;
        const timeStr = formatTime(msg.createdAt);
        const preview = msg.content.length > 70 ? msg.content.slice(0, 70) + '…' : msg.content;

        let readStatusHtml;
        if (isRead) {
          const readAt = msg.acknowledgedAt
            ? formatTime(msg.acknowledgedAt)
            : 'recently';
          readStatusHtml = `
            <span style="color:var(--success);">✅ Read ${readAt}</span>`;
        } else {
          readStatusHtml = `
            <span style="color:var(--warning);">⏳ Awaiting read</span>`;
        }

        return `
          <div class="sent-message-item">
            <div class="sent-msg-header">
              <span class="sent-msg-to">To: ${escHtml(msg.toName)}</span>
              <span class="sent-msg-status">${readStatusHtml}</span>
            </div>
            <div class="sent-msg-subject">${escHtml(msg.subject)}</div>
            <div class="sent-msg-preview">${escHtml(preview)}</div>
            <div class="sent-msg-time">Sent ${timeStr}</div>
          </div>`;
      }).join('');
    }

    // ── Update teacher stats ─────────────────────────────────────────────────
    function updateTeacherStats(messages) {
      const confirmed = messages.filter(m =>  m.acknowledged).length;
      const pending   = messages.filter(m => !m.acknowledged).length;

      document.getElementById('stat-sent').textContent      = messages.length;
      document.getElementById('stat-confirmed').textContent = confirmed;
      document.getElementById('stat-pending').textContent   = pending;

      const badge = document.getElementById('sent-badge');
      badge.innerHTML = pending > 0
        ? `<span class="badge badge-warning">${pending} unread</span>`
        : messages.length > 0
          ? `<span class="badge badge-success">All read</span>`
          : '';
    }

    // ── Send message ─────────────────────────────────────────────────────────
    async function sendMessage(e) {
      e.preventDefault();

      const toUid   = document.getElementById('to-parent').value;
      const subject = document.getElementById('msg-subject').value.trim();
      const content = document.getElementById('msg-body').value.trim();

      if (!toUid) {
        setAlert('compose-alert', 'error', 'Please select a parent to send to.');
        return;
      }

      const parent = parentsList.find(p => p.uid === toUid);
      if (!parent) return;

      const btn = document.getElementById('send-btn');
      btn.disabled = true;
      btn.textContent = 'Sending…';
      clearAlert('compose-alert');

      try {
        await db.collection('messages').add({
          fromUserId:    currentUser.uid,
          fromName:      currentUser.displayName,
          toUserId:      toUid,
          toName:        parent.displayName,
          subject,
          content,
          createdAt:     firebase.firestore.FieldValue.serverTimestamp(),
          acknowledged:  false,
          acknowledgedAt: null,
        });

        // Reset form
        document.getElementById('compose-form').reset();
        document.getElementById('char-count').textContent = '0';
        clearAlert('compose-alert');

        showToast(
          'Message sent!',
          `${parent.displayName} will be notified every hour until they confirm reading it.`,
          '📤'
        );
      } catch (err) {
        setAlert('compose-alert', 'error', 'Failed to send message. Please try again.');
      }

      btn.disabled = false;
      btn.textContent = '📤 Send Message';
    }

    // ── Helpers ──────────────────────────────────────────────────────────────
    function escHtml(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    function setAlert(id, type, msg) {
      const el = document.getElementById(id);
      if (!el) return;
      el.className = `alert alert-${type}`;
      el.textContent = msg;
      el.style.display = 'flex';
    }

    function clearAlert(id) {
      const el = document.getElementById(id);
      if (el) el.style.display = 'none';
    }

    window.addEventListener('beforeunload', () => {
      if (sentListener) sentListener();
    });
  </script>
</body>
</html>
